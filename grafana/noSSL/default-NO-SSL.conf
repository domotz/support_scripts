server {
    listen 80;
    server_name _;

    # Redirect /grafana (without slash) → /grafana/
    location = /grafana {
        return 301 $scheme://$host$request_uri/;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # These are critical for subpath
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        #proxy_set_header Connection $connection_upgrade;
        proxy_set_header Connection "upgrade";


        # Important! Don't let Nginx rewrite redirects by default
        proxy_redirect off;

        # Try to serve static files directly, then proxy to Grafana
        try_files $uri @grafana;
    }

location /grafana/api/live/ws {
    proxy_pass http://grafana:3000/grafana/api/live/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
}


    location @grafana {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
    }

    # Redirect root to /grafana/
    location = / {
        return 301 $scheme://$host/grafana/;
    }

}

# Add this at the server level or http level for WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
